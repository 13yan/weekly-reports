<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手游市场资讯工作台</title>
<style>
:root {
  --bg: #f5f6fa; --card: #ffffff; --muted: #eef0f5;
  --text: #1a1d26; --t2: #5b677d; --t3: #8e99af;
  --line: #e1e4ea; --ll: #eef0f4;
  --blue: #2563eb; --cyan: #0891b2; --green: #059669;
  --orange: #ea580c; --purple: #7c3aed; --rose: #dc2626; --amber: #d97706;
  --sw: 232px; --th: 54px; --r: 10px; --rs: 6px; --rl: 14px;
  --f: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --fn: 'SF Pro Display',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--f);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.app{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:var(--sw);flex-shrink:0;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;z-index:100}
.sh{padding:18px 18px 14px;border-bottom:1px solid var(--line)}
.sh h1{font-size:15px;font-weight:700;color:var(--blue)}
.sh p{font-size:10px;color:var(--t3);margin-top:2px}
.sh .bdg{display:inline-block;margin-top:8px;background:var(--muted);color:var(--blue);font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px}
.sn{flex:1;overflow-y:auto;padding:4px 0}
.ns{padding:14px 18px 4px;font-size:9.5px;color:var(--t3);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:8px;padding:7px 18px;cursor:pointer;color:var(--t2);font-size:12.5px;font-weight:500;border-left:2px solid transparent;text-decoration:none;transition:all .12s ease}
.ni:hover{background:var(--muted);color:var(--text)}
.ni.act{background:#eef2ff;color:var(--blue);font-weight:600;border-left-color:var(--blue)}
.ni .ic{width:16px;text-align:center;font-size:11px;opacity:.5;flex-shrink:0}
.ni.act .ic{opacity:1}
.sf{padding:12px 18px;border-top:1px solid var(--line);font-size:10px;color:var(--t3)}
.sf .sb{width:100%;margin-top:8px;background:var(--blue);color:#fff;border:none;padding:6px 12px;border-radius:var(--rs);font-size:11px;font-weight:600;cursor:pointer}
.sf .sb:hover{background:#1d4ed8}

/* Main */
.mn{flex:1;display:flex;flex-direction:column;min-width:0}
.tb{height:var(--th);flex-shrink:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.tb .ttl{font-size:13px;font-weight:600}
.tb .ttl span{color:var(--blue)}
.tb .rt{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--t3)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;vertical-align:middle}
.ct{flex:1;overflow-y:auto;padding:22px 26px 48px}
.pg{display:none}
.pg.act{display:block}

/* Components */
.ph{margin-bottom:20px}
.ph h2{font-size:21px;font-weight:700;letter-spacing:-.3px}
.ph p{font-size:13px;color:var(--t3);margin-top:2px}

.banner{background:linear-gradient(135deg,#eef2ff,#fff 60%,#f0f9ff);border-radius:var(--rl);padding:22px 26px;margin-bottom:18px;border:1px solid var(--blue);border-left:4px solid var(--blue)}
.banner h2{font-size:18px;font-weight:700}
.banner .meta{font-size:12px;color:var(--t3);margin-top:4px;display:flex;gap:16px;flex-wrap:wrap}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:16px}
.sc{background:#fff;border:1px solid var(--ll);border-radius:var(--rs);padding:10px 14px}
.sc .n{font-size:22px;font-weight:700;font-family:var(--fn);line-height:1.1}
.sc .l{font-size:10.5px;color:var(--t3);margin-top:1px}

.card{background:var(--card);border-radius:var(--rl);padding:20px 24px;margin-bottom:16px;border:1px solid var(--line)}
.ch{display:flex;align-items:center;gap:8px;padding-bottom:12px;margin-bottom:14px;border-bottom:1px solid var(--line);font-size:15px;font-weight:600}
.tg{display:inline-flex;background:var(--muted);color:var(--blue);font-size:9.5px;font-weight:600;padding:1px 7px;border-radius:4px;margin-left:8px}

/* KPI */
.kr{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:#fff;border-radius:var(--r);padding:14px 16px;border:1px solid var(--line);border-top:3px solid transparent}
.kpi:nth-child(1){border-top-color:var(--blue)}
.kpi:nth-child(2){border-top-color:var(--cyan)}
.kpi:nth-child(3){border-top-color:var(--orange)}
.kpi:nth-child(4){border-top-color:var(--purple)}
.kpi .kt{display:flex;align-items:center;justify-content:space-between}
.kpi .kl{font-size:11px;color:var(--t3);font-weight:500}
.kpi .kv{font-size:20px;font-weight:700;font-family:var(--fn);margin-top:6px}
.kpi .kc{font-size:11px;margin-top:2px}

/* Table */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 10px;font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.3px;border-bottom:2px solid var(--line);white-space:nowrap}
td{padding:6px 10px;border-bottom:1px solid var(--ll);font-size:12.5px;color:var(--t2)}
tr:hover{background:var(--bg)}
.gn{color:var(--text);font-weight:600}
.rk{font-weight:700;font-family:var(--fn)}
.cu{color:var(--green);font-weight:600}
.cd{color:var(--rose);font-weight:600}

/* Grids */
.tg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.ti{background:#fff;border-radius:var(--rs);padding:14px;border:1px solid var(--line)}
.ti .ico{font-size:18px;margin-bottom:6px}
.ti h4{font-size:12.5px;font-weight:600;margin-bottom:3px}
.ti p{font-size:11.5px;color:var(--t2);line-height:1.6}

.pg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.pi{background:#fff;border-radius:var(--rs);padding:14px 16px;border:1px solid var(--line)}
.pi .pn{font-size:12.5px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.pi .pe{font-size:11.5px;color:var(--t2);padding:3px 0;border-bottom:1px solid var(--ll)}
.pi .pe:last-child{border:none}
.pi .pd{color:var(--t3);font-size:10px}

/* Event */
.ev{background:var(--bg);border-radius:var(--rs);padding:10px 14px;border-left:3px solid var(--blue);margin-bottom:8px}
.ev .ew{font-size:10.5px;color:var(--t3)}
.ev h4{font-size:12.5px;font-weight:600;margin-top:1px}
.ev p{font-size:11.5px;color:var(--t2);margin-top:2px}

/* Surge chips */
.sgg{margin-bottom:10px}
.sgw{font-size:12px;font-weight:600;margin-bottom:4px}
.sgc{display:flex;flex-wrap:wrap;gap:4px}
.sg{background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:4px 8px;font-size:11px}
.sg .sn{font-weight:600;color:var(--text)}
.sg .sc2{color:var(--green);font-weight:600}
.sg .si{color:var(--t3);font-size:10px;margin-top:1px}

/* Timeline */
.tlr{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--ll)}
.tlr:last-child{border:none}
.tlb{flex-shrink:0;width:52px}
.tlb .n2{font-size:15px;font-weight:700;color:var(--blue);font-family:var(--fn)}
.tlb .d2{font-size:9.5px;color:var(--t3)}
.tlbd{flex:1}
.tlbd p{font-size:12px;color:var(--t2)}

.ib{background:var(--muted);border-radius:var(--rs);padding:12px 16px;border-left:3px solid var(--green);margin-bottom:12px}
.ib .ibl{font-size:11px;font-weight:600;color:var(--green);margin-bottom:2px}
.ib p{font-size:12px;color:var(--t2);line-height:1.7}

/* Placeholder */
.ph2{text-align:center;padding:40px;color:var(--t3)}
.ph2 .big{font-size:36px;margin-bottom:12px}
.ph2 h3{font-size:15px;color:var(--text);margin-bottom:6px}
.ph2 p{font-size:12.5px;line-height:1.7}

.mt{display:none;position:fixed;top:10px;left:10px;z-index:200;background:#fff;color:var(--text);border:1px solid var(--line);width:34px;height:34px;border-radius:8px;font-size:15px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.06)}
@media(max-width:768px){
  .sidebar{position:fixed;inset:0;width:100%;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mt{display:flex}
  .ct{padding:14px}
  .kr{grid-template-columns:repeat(2,1fr)}
  .sr{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

}
