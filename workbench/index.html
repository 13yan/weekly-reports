<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>市场资讯工作台 — 小游戏周报</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
<style>
/* ===== Design Tokens ===== */
:root {
  --primary: #0a7c42;
  --primary-light: #e6f7ee;
  --primary-dark: #056635;
  --primary-glow: rgba(10,124,66,0.15);
  --sidebar-bg: #0b121c;
  --sidebar-surface: #111d2b;
  --bg: #f4f5f7;
  --card-bg: #ffffff;
  --text: #141a26;
  --text-secondary: #5b6778;
  --text-tertiary: #95a0ae;
  --border: #e6e8ec;
  --border-light: #eef0f2;
  --orange: #f97316;
  --red: #e53e3e;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --amber: #d97706;
  --rose: #e11d48;
  --teal: #0d9488;
  --tag-bg: #e8f5ee;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-lg: 0 12px 24px rgba(0,0,0,0.06), 0 4px 8px rgba(0,0,0,0.04);
  --radius: 8px;
  --radius-sm: 4px;
  --radius-lg: 12px;
  --sidebar-w: 230px;
  --topbar-h: 52px;
  --font: -apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue","Microsoft YaHei","Noto Sans SC",sans-serif;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --safe-bottom: env(safe-area-inset-bottom,0px);
  --safe-top: env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;font-size:14px}
.sidebar{width:var(--sidebar-w);position:fixed;top:0;left:0;bottom:0;z-index:100;background:var(--sidebar-bg);color:#fff;display:flex;flex-direction:column;overflow-y:auto;transition:transform .35s cubic-bezier(0.4,0,0.2,1);scrollbar-width:thin}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
.sidebar-logo h1{font-size:16px;font-weight:700;letter-spacing:.5px;background:linear-gradient(135deg,#0a7c42 0%,#34d399 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-logo p{font-size:10px;color:rgba(255,255,255,.3);margin-top:3px;letter-spacing:.5px}
.sidebar-nav{flex:1;padding:6px 0}
.nav-item{display:flex;align-items:center;padding:7px 20px;cursor:pointer;color:rgba(255,255,255,.45);font-size:12.5px;transition:var(--transition);border-left:2px solid transparent;text-decoration:none;gap:10px;letter-spacing:.2px}
.nav-item:hover{background:rgba(255,255,255,.03);color:rgba(255,255,255,.75)}
.nav-item.scroll-active{background:rgba(10,124,66,.1);color:#0a7c42;border-left-color:#0a7c42}
.nav-item .nav-num{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);font-size:9px;font-weight:700;flex-shrink:0}
.nav-item .badge{margin-left:auto;background:var(--primary);color:#fff;font-size:9px;padding:2px 7px;border-radius:6px;font-weight:600}
.nav-section-title{padding:14px 20px 4px;font-size:9px;color:rgba(255,255,255,.18);text-transform:uppercase;letter-spacing:1.8px;font-weight:600}
.sidebar-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.04);font-size:10px;color:rgba(255,255,255,.2);line-height:1.7}
.sidebar-footer .sync-btn{margin-top:8px;background:rgba(10,124,66,.12);color:#0a7c42;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:11px;transition:var(--transition);width:100%;font-weight:500}
.sidebar-footer .sync-btn:hover{background:rgba(10,124,66,.22)}
.sidebar-footer .sync-btn:disabled{opacity:.35;cursor:not-allowed}
.menu-toggle{display:none;position:fixed;top:10px;left:10px;z-index:200;background:var(--sidebar-bg);color:#fff;border:none;width:36px;height:36px;border-radius:8px;font-size:17px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.sidebar-overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.35)}
.main{margin-left:var(--sidebar-w);min-height:100vh}
.topbar{background:rgba(255,255,255,.88);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);padding:0 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;height:var(--topbar-h)}
.topbar-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.topbar-title span{color:var(--primary)}
.topbar-right{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text-tertiary)}
.topbar-right .status-dot{width:6px;height:6px;border-radius:50%;background:var(--primary);display:inline-block}
.content{padding:24px 28px 60px;max-width:1200px}
.content>*{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.banner{background:linear-gradient(145deg,#0f1a26 0%,#19293d 50%,#1e3148 100%);border-radius:var(--radius-lg);padding:26px 30px;color:#fff;margin-bottom:22px;position:relative;overflow:hidden}
.banner::before{content:'';position:absolute;right:-60px;top:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(10,124,66,.1) 0%,transparent 70%)}
.banner::after{content:'';position:absolute;left:40%;bottom:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.05) 0%,transparent 70%)}
.banner h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.banner h1 span{color:var(--primary)}
.banner .meta{display:flex;gap:16px;margin-top:6px;font-size:12.5px;color:rgba(255,255,255,.5);flex-wrap:wrap}
.banner .meta-item{display:flex;align-items:center;gap:4px}
.banner .divider{color:rgba(255,255,255,.12)}
.banner .stat-group{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
.banner .stat-card{display:flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(255,255,255,.06);border-radius:8px;border:1px solid rgba(255,255,255,.05)}
.banner .stat-icon{font-size:16px;opacity:.6}
.banner .stat-num{font-size:20px;font-weight:700;color:var(--primary);line-height:1}
.banner .stat-label{font-size:10.5px;color:rgba(255,255,255,.45);margin-top:2px}
.banner .stat-right .stat-num{color:#60a5fa}
.banner .stat-cross .stat-num{color:#f59e0b}
.banner .stat-cat .stat-num{color:#a78bfa}
.banner .stat-mover .stat-num{color:#f87171}
.week-selector{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.week-btn{padding:5px 16px;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);cursor:pointer;font-size:12px;color:var(--text-secondary);transition:var(--transition);white-space:nowrap;font-weight:500;box-shadow:var(--shadow-sm)}
.week-btn:hover{border-color:var(--primary);color:var(--primary)}
.week-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 6px var(--primary-glow)}
.section{background:var(--card-bg);border-radius:var(--radius-lg);padding:22px 24px;margin-bottom:16px;box-shadow:var(--shadow);transition:box-shadow .25s;scroll-margin-top:calc(var(--topbar-h) + 12px)}
.section:hover{box-shadow:var(--shadow-md)}
.section-title{font-size:14.5px;font-weight:700;color:var(--text);margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--primary);display:flex;align-items:center;gap:8px}
.section-title .section-tag{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:5px;background:var(--primary-light);color:var(--primary);font-size:11px;font-weight:700;flex-shrink:0}
.section-title .more-link{margin-left:auto;font-size:11.5px;font-weight:500;color:var(--primary);cursor:pointer;text-decoration:none;white-space:nowrap;opacity:.55;transition:opacity .2s}
.section-title .more-link:hover{opacity:1}
.subsection-title{font-size:13px;font-weight:600;color:var(--text);margin:14px 0 8px;padding-left:10px;border-left:2px solid var(--primary);display:flex;align-items:center;gap:6px}
.card-grid{display:grid;gap:10px}
.card-grid-2{grid-template-columns:1fr 1fr}
.card{background:var(--card-bg);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-sm);transition:var(--transition);cursor:pointer;border:1px solid var(--border-light)}
.card:hover{box-shadow:var(--shadow-md);border-color:transparent}
.card .card-title{font-size:13px;font-weight:600;line-height:1.5;color:var(--text)}
.card .card-desc{font-size:12px;color:var(--text-secondary);margin-top:4px;line-height:1.6}
.card .card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.card-highlight{background:linear-gradient(135deg,#f5fcf8 0%,#e8f5ee 100%);border:1px solid rgba(10,124,66,.12)}
.tag{font-size:10px;padding:2px 8px;border-radius:6px;background:var(--tag-bg);color:var(--primary);display:inline-block;font-weight:500}
.tag.blue{background:#eff6ff;color:var(--blue)}
.tag.orange{background:#fff7ed;color:var(--orange)}
.tag.red{background:#fef2f2;color:var(--red)}
.score{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;background:#e6f7ee;color:#0a7c42;margin-left:4px;font-weight:600}
.table-wrap{overflow-x:auto;margin-top:6px;border-radius:var(--radius-sm);border:1px solid var(--border-light)}
.table-wrap table{width:100%;border-collapse:collapse;font-size:12px;min-width:340px}
.table-wrap th{background:#f6f7f9;padding:8px 10px;text-align:center;font-weight:600;color:var(--text-secondary);font-size:11px;border-bottom:1.5px solid var(--border);white-space:nowrap;letter-spacing:.3px}
.table-wrap td{padding:7px 10px;border-bottom:1px solid var(--border-light);text-align:center;vertical-align:middle}
.table-wrap tbody tr:hover td{background:#f6f8fc}
.table-wrap tbody tr:last-child td{border-bottom:none}
.rank-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;font-weight:700;font-size:11.5px}
.top100-toggle{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;border:1px solid var(--border);background:var(--card-bg);border-radius:6px;font-size:11.5px;color:var(--text-secondary);cursor:pointer;transition:var(--transition);font-weight:500}
.top100-toggle:hover{border-color:var(--primary);color:var(--primary)}
.top100-toggle.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.top100-wrap{margin-top:8px;border:1px solid var(--border-light);border-radius:var(--radius-sm);overflow:hidden}
.top100-wrap table{font-size:11.5px}
.top100-wrap td{padding:5px 8px}
.top100-wrap .top100-rank{color:var(--text-tertiary);font-weight:500}
.top100-wrap .top100-name{text-align:left;font-weight:500}
.top100-wrap .top100-company{font-size:10px;color:var(--text-tertiary);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-num.top3{background:var(--primary);color:#fff}
.rank-num.top10{background:var(--primary-light);color:var(--primary)}
.rank-num.normal{color:var(--text-tertiary);background:#f3f4f6}
.up{color:var(--red);font-weight:600}
.down{color:var(--primary)}
.bg-gold td{background:#fffbeb!important}
.policy-box{background:#f9fafb;border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;border-left:3px solid var(--border);transition:var(--transition)}
.policy-box:hover{border-left-color:var(--primary);box-shadow:var(--shadow-sm)}
.policy-box .pb-title{font-size:13.5px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.policy-box .pb-title .pb-icon{font-size:18px}
.policy-box .pb-body{font-size:12px;color:var(--text-secondary);line-height:1.7}
.policy-box .pb-body ul{padding-left:16px;margin-top:4px}
.policy-box .pb-body li{margin-bottom:3px}
.policy-box .pb-body .hl{color:var(--red);font-weight:600}
.policy-box .pb-body b{color:var(--text)}
.policy-link{color:var(--primary);text-decoration:none;font-weight:500;border-bottom:1px dashed var(--primary);transition:opacity .2s}
.policy-link:hover{opacity:.7;border-bottom-style:solid}
.chart-section{padding:0}
.chart-grid{display:grid;gap:12px}
.chart-grid-2{grid-template-columns:1fr 1fr}
.chart-grid-3{grid-template-columns:1fr 1fr 1fr}
.chart-box{height:210px;position:relative;border-radius:var(--radius-sm);border:1px solid var(--border-light);padding:4px}
.chart-box canvas{width:100%!important;height:100%!important}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px;color:var(--text-tertiary)}
.loading-state .spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state p{margin-top:12px;font-size:14px}
.error-state{text-align:center;padding:100px 20px}
.error-state .err-icon{font-size:44px;margin-bottom:10px}
.error-state p{font-size:14px;color:var(--text-tertiary)}
.error-state .retry-btn{margin-top:14px;padding:7px 22px;background:var(--primary);color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.site-footer{text-align:center;padding:24px 0 12px;font-size:11.5px;color:var(--text-tertiary);border-top:1px solid var(--border);margin-top:18px;line-height:1.8}
.site-footer a{color:var(--primary);text-decoration:none;font-weight:500}
@media(max-width:1100px){.chart-grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:900px){
  .card-grid-2,.chart-grid-2,.chart-grid-3{grid-template-columns:1fr}
  .content{padding:10px 12px}
  .topbar{padding:0 14px;height:48px}
  .topbar-title{font-size:13px}
  .topbar-right .hide-mobile{display:none}
  .banner{padding:18px 20px;border-radius:var(--radius)}
  .banner h1{font-size:17px}
  .banner .stat-group{gap:8px}
  .banner .stat-card{padding:6px 12px}
  .banner .stat-num{font-size:17px}
  .week-selector{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;gap:4px}
  .week-btn{font-size:11px;padding:4px 12px;flex-shrink:0}
  .section{padding:14px 16px;margin-bottom:10px}
  .section-title{font-size:13.5px}
  .chart-box{height:180px}
  .table-wrap table{font-size:11.5px;min-width:300px}
  .table-wrap td,.table-wrap th{padding:5px 7px}
  .policy-box{padding:10px 12px}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .menu-toggle{display:flex}
  .main{margin-left:0}
}
@media(max-width:480px){
  .content{padding:6px 8px}
  .banner{padding:14px;border-radius:var(--radius-sm)}
  .banner h1{font-size:15px}
  .banner .meta{font-size:11px;gap:6px}
  .banner .stat-card{padding:5px 10px}
  .banner .stat-num{font-size:15px}
  .section{padding:10px 12px}
  .section-title{font-size:12.5px}
  .table-wrap table{font-size:10.5px;min-width:240px}
  .table-wrap td,.table-wrap th{padding:4px 5px}
  .chart-box{height:150px}
}
</style>
</head>

<script>
/* ============================================================
   市场资讯工作台
   数据流：manifest.json → report-data.json（每个周报）
   适配实际数据格式（来自 gen_report_v3.js 输出）
   ============================================================ */

var BASE = '../', MANIFEST_URL = './manifest.json';
var CHART_COLORS = ['#667eea','#764ba2','#e74c3c','#e67e22','#27ae60','#2980b9','#8e44ad','#f39c12','#1abc9c','#2ecc71','#e91e63','#00bcd4','#ff5722','#607d8b','#9b59b6'];

var DATA = {}, weekKeys = [], currentKey = null, reportMap = {};
var chartInstances = {}, navSections = [];

// ====== 启动 ======
function init() {
  document.getElementById('mainContent').innerHTML =
    '<div class="loading-state"><div class="spinner"></div><p>正在加载周报数据...</p></div>';
  fetchJSON(MANIFEST_URL).then(function(manifest) {
    if (!manifest || !manifest.reports || !manifest.reports.length) return renderEmpty();
    var reports = manifest.reports;
    // 并行加载所有 report-data.json
    var promises = [];
    reports.forEach(function(r) {
      if (r.hasData === false) return;
      weekKeys.push(r.id);
      promises.push(
        fetchJSON(BASE + r.dirName + '/report-data.json').then(function(data) {
          DATA[r.id] = normalizeData(data, r);
        }).catch(function() { /* 跳过加载失败的周 */ })
      );
    });
    return Promise.all(promises).then(function() {
      // 建立 id → report 映射
      reports.forEach(function(r) { reportMap[r.id] = r; });
      // 清掉加载失败的 key
      weekKeys = weekKeys.filter(function(k) { return DATA[k]; });
      if (!weekKeys.length) return renderEmpty();
      currentKey = weekKeys[0];
      renderSidebarList(reports);
      renderPage(currentKey);
    });
  }).catch(function() {
    renderError('网络连接失败，请检查网络后重试。');
  });
}

// ====== 标准化数据（兼容不同版本） ======
function normalizeData(d, meta) {
  // 补充 week 字段
  if (!d.week) d.week = {};
  if (!d.week.label) d.week.label = meta ? meta.label : '';
  if (!d.week.date) d.week.date = meta ? meta.date : '';
  if (!d.week.tag) d.week.tag = meta ? meta.label : '';
  // 确保 stats
  if (!d.stats) d.stats = {};
  // 确保 top20
  if (!d.top20) d.top20 = { wx: [], dy: [] };
  // 确保 top100
  if (!d.top100) d.top100 = { wx: [], dy: [] };
  // 确保 simulation
  if (!d.simulation) d.simulation = { wxCount: 0, dyCount: 0, games: [] };
  // 确保 movers
  if (d.movers && !Array.isArray(d.movers)) {
    var arr = [];
    for (var k in d.movers) { if (d.movers[k] && typeof d.movers[k] === 'object' && d.movers[k].name) arr.push(d.movers[k]); }
    if (arr.length) d.movers = arr;
  }
  if (!d.movers) d.movers = [];
  // 确保 policies
  if (!d.policies) d.policies = {};
  // 确保 trends
  if (!d.trends) d.trends = [];

  // ---- 桌面端 DATA 格式兼容（w19-w22） ----
  // 检测: 有 banner 字段说明是桌面端硬编码格式
  if (d.banner && typeof d.banner === 'object' && !d.stats.wxCount) {
    // 1) banner → stats
    d.stats.wxCount = d.banner.wechat || d.stats.wxCount;
    d.stats.dyCount = d.banner.douyin || d.stats.dyCount;
    d.stats.crossPlatform = d.banner.cross || d.stats.crossPlatform;
    d.stats.categories = d.banner.category || d.stats.categories;

    // 2) 顶层字段 → week
    if (d.label) d.week.label = d.label;
    if (d.date) d.week.date = d.date;
    if (d.weekTag || d.label) d.week.tag = d.weekTag || d.label;

    // 3) summary 数组 → summary.core 字符串
    if (Array.isArray(d.summary)) {
      d.summary = {
        core: d.summary.map(function(s){ return s.title + ' ' + s.desc; }).filter(Boolean).join('\n'),
        keyEvents: [],
        coreConcerns: []
      };
    }

    // 4)  wechatTop20 / douyinTop20 数组 → top20.wx / top20.dy
    if (d.wechatTop20 && !d.top20.wx.length) {
      d.top20.wx = d.wechatTop20.map(function(r, i){
        return { rank: i + 1, name: r[0], category: r[2], change: r[3], isCrossPlatform: !!r[1] };
      });
    }
    if (d.douyinTop20 && !d.top20.dy.length) {
      d.top20.dy = d.douyinTop20.map(function(r, i){
        return { rank: i + 1, name: r[0], category: r[2], change: r[3], isCrossPlatform: !!r[1] };
      });
    }

    // 5) simData 数组 → simulation.games 对象数组
    if (d.simData && !d.simulation.games.length) {
      function cleanRank(v) { v = (v || '').replace('#', ''); return (v === '─' || v === '未上榜' || v === '--') ? '' : v; }
      d.simulation.games = d.simData.map(function(s){
        return {
          name: s[0] || '', company: s[1] || '', mergePlay: s[2] || '', theme: s[3] || '',
          wxRank: cleanRank(s[4]),
          dyRank: cleanRank(s[5]),
          diff: s[6] || ''
        };
      });
    }
    // 从 simOverview 提取 wxCount / dyCount
    if (d.simOverview && (!d.simulation.wxCount || !d.simulation.dyCount)) {
      var m1 = d.simOverview.match(/微信上榜(\d+)款/);
      var m2 = d.simOverview.match(/抖音上榜(\d+)款/);
      if (m1) d.simulation.wxCount = parseInt(m1[1]);
      if (m2) d.simulation.dyCount = parseInt(m2[1]);
    }

    // 6)  surgeData 数组 → movers 对象数组
    if (d.surgeData && !d.movers.length) {
      d.movers = d.surgeData.map(function(sg){
        var rawRise = sg[3] || '';
        var riseNum = rawRise === 'NEW' || rawRise === '登顶' || rawRise.indexOf('新进榜') >= 0 ? 999
          : parseInt(rawRise.replace('↑', '')) || 0;
        return {
          name: sg[0] || '', platform: sg[1] || '', category: sg[2] || '',
          rise: riseNum, company: sg[4] || '', insight: sg[5] || '',
          bgClass: sg[6] || ''
        };
      });
    }

    // 7)  policyContent 字符串 → policies._combinedHtml
    if (d.policyContent) {
      d.policies = { _combinedHtml: d.policyContent };
    }

    // 8)  trends 字符串数组 → {title, content} 对象数组
    if (Array.isArray(d.trends) && d.trends.length && typeof d.trends[0] === 'string') {
      d.trends = d.trends.map(function(t){ return { title: t, content: '' }; });
    }

    // 9)  传递额外已有字段
    d.top20Insight = d.top20Insight || '';
    d.simConclusion = d.simConclusion || '';
    d.surgeConclusion = d.surgeConclusion || '';
    d.catDesc = d.catDesc || '';
    d.highlight = meta ? meta.highlight : '';
  }

  return d;
}

// ====== Top100 展开/收起 ======
function toggleTop100(btn, platform) {
  var wrap = document.getElementById(platform + 'Top100Wrap');
  if (!wrap) return;
  if (wrap.style.display !== 'none') {
    wrap.style.display = 'none';
    btn.classList.remove('active');
    btn.innerHTML = '📋 显示完整 Top100 榜单';
    return;
  }
  // 首次展开 — 填充数据
  var body = document.getElementById(platform + 'Top100Body');
  if (body && !body._populated) {
    body._populated = true;
    var d = DATA[currentKey];
    var list = d && d.top100 ? (platform === 'wx' ? d.top100.wx : d.top100.dy) : [];
    var platformLabel = platform === 'wx' ? '微信' : '抖音';
    if (list && list.length) {
      body.innerHTML = list.map(function(g) {
        var rk = g.rank || 0;
        var name = g.name || '';
        var cat = g.category || '';
        var company = g.company || '--';
        var change = g.change || '';
        var isCross = g.isCrossPlatform;
        return '<tr>' +
          '<td class="top100-rank">' + rk + '</td>' +
          '<td class="top100-name">' + escHTML(name) + (isCross ? '<span class="score">双</span>' : '') + '</td>' +
          '<td style="font-size:10px;color:var(--text-tertiary)">' + platformLabel + '</td>' +
          '<td><span class="tag">' + escHTML(cat) + '</span></td>' +
          '<td class="top100-company" title="' + escAttr(company) + '">' + escHTML(company) + '</td>' +
          '<td style="font-size:11px">' + escHTML(change) + '</td>' +
        '</tr>';
      }).join('');
    } else {
      body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;padding:16px">暂无完整榜单数据</td></tr>';
    }
  }
  wrap.style.display = 'block';
  btn.classList.add('active');
  btn.innerHTML = '📋 收起完整榜单';
}

// ====== 填充数据 ======
function fillData(d, key) {
  if (!d) return;
  // 更新 topbar
  document.getElementById('currentWeekLabel').textContent = d.week ? (d.week.label || '') : '';

  // 更新周按钮
  renderWeekButtons(key);

  // --- 摘要 ---
  var summary = d.summary || {};
  var coreEl = document.getElementById('summaryCore');
  if (coreEl) {
    if (summary.core) {
      coreEl.textContent = summary.core;
    } else {
      coreEl.style.display = 'none';
    }
  }
  // 本周重大事件
  var events = summary.keyEvents || [];
  var evtEl = document.getElementById('keyEventsBlock');
  if (evtEl) {
    if (events.length) {
      evtEl.innerHTML = '<div style="font-size:14px;font-weight:700;color:#3b82f6;margin-bottom:8px">📌 本周重大事件</div>' +
        events.map(function(e) { return '<div style="padding:6px 12px;margin-bottom:4px;font-size:13px;background:#f0f4ff;border-left:3px solid #3b82f6;border-radius:4px">▸ ' + escHTML(e) + '</div>'; }).join('');
    } else { evtEl.innerHTML = ''; }
  }
  // 核心关注
  var concerns = summary.coreConcerns || [];
  var ccEl = document.getElementById('coreConcernsBlock');
  if (ccEl) {
    if (concerns.length) {
      ccEl.innerHTML = '<div style="font-size:14px;font-weight:700;color:var(--primary);margin-bottom:8px">🎯 核心关注</div>' +
        concerns.map(function(c) { return '<div style="padding:6px 12px;margin-bottom:4px;font-size:13px;background:#f0faf4;border-left:3px solid var(--primary);border-radius:4px">◆ ' + escHTML(c) + '</div>'; }).join('');
    } else { ccEl.innerHTML = ''; }
  }

  // --- Top20 ---
  var top20 = d.top20 || {};
  renderTable('wxTop20Body', top20.wx || [], true);
  renderTable('dyTop20Body', top20.dy || [], true);
  var insightEl = document.getElementById('top20Insight');
  if (insightEl) insightEl.textContent = d.top20Insight || '';

  // --- 模拟经营 ---
  var sim = d.simulation || {};
  var simOvEl = document.getElementById('simOverview');
  if (simOvEl) {
    simOvEl.textContent = '微信上榜' + (sim.wxCount || '--') + '款，抖音上榜' + (sim.dyCount || '--') + '款。';
  }
  renderSimTable(sim.games || []);
  var simConcEl = document.getElementById('simConclusion');
  if (simConcEl) simConcEl.textContent = d.simConclusion || '';

  // --- 图表 ---
  var charts = d.charts || {};
  if (charts.cats && charts.cats.length && charts.wx && charts.dy) {
    renderCharts(charts);
    document.getElementById('chartGrid').style.display = 'grid';
  } else {
    document.getElementById('chartGrid').style.display = 'none';
  }
  var catEl = document.getElementById('catDesc');
  if (catEl) catEl.textContent = d.catDesc || '';

  // --- 飙升 ---
  renderSurgeTable(d.movers || []);
  var sgEl = document.getElementById('surgeConclusion');
  if (sgEl) sgEl.textContent = (d.movers && d.movers.conclusion) || d.surgeConclusion || '';

  // --- 政策 ---
  renderPolicies(d.policies || {});
  // --- 趋势 ---
  renderTrends(d.trends || []);
}

// ====== 周按钮渲染 ======
function renderWeekButtons(activeKey) {
  var el = document.getElementById('weekSelector');
  if (!el) return;
  el.innerHTML = weekKeys.map(function(k) {
    var d = DATA[k];
    var label = d && d.week ? (d.week.label || k) : k;
    return '<button class="week-btn' + (k === activeKey ? ' active' : '') + '" data-week="' + k + '">' + escHTML(label) + '</button>';
  }).join('');
  // 绑定点击事件
  el.querySelectorAll('.week-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var wk = this.getAttribute('data-week');
      if (wk && wk !== currentKey && DATA[wk]) renderPage(wk);
    });
  });
}

// ====== 侧边栏列表 ======
function renderSidebarList(reports) {
  var el = document.getElementById('sidebarWeekList');
  if (!el) return;
  el.innerHTML = reports.map(function(r, i) {
    return '<a class="nav-item" href="#" data-sidebar-week="' + r.id + '" data-dir="' + escAttr(r.dirName) + '" data-hasdata="' + (r.hasData !== false) + '"><span>' + escHTML(r.label) + '</span>' + (i === 0 ? '<span class="badge">最新</span>' : '') + '</a>';
  }).join('');
  el.querySelectorAll('[data-sidebar-week]').forEach(function(a) {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      var wk = this.getAttribute('data-sidebar-week');
      if (DATA[wk]) {
        renderPage(wk);
        if (window.innerWidth <= 768) toggleSidebar();
      }
    });
  });
}

function updateNavStates(key) {
  // 周按钮
  document.querySelectorAll('.week-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-week') === key);
  });
  // 侧边栏
  document.querySelectorAll('[data-sidebar-week]').forEach(function(a) {
    a.classList.toggle('scroll-active', a.getAttribute('data-sidebar-week') === key);
  });
}

// ====== 表格渲染 ======
function renderTable(id, data, isTop20) {
  var el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '';
  data.forEach(function(r, i) {
    var rank = r.rank || r.rank !== undefined ? r.rank : (i + 1);
    var name = r.name || '';
    var cat = r.category || '';
    var change = r.change || '';
    var isCross = r.isCrossPlatform;
    var rk = rank;
    var rc = rk <= 3 ? 'top3' : rk <= 10 ? 'top10' : 'normal';
    var cc = change.indexOf('↑') >= 0 ? 'up' : change.indexOf('↓') >= 0 ? 'down' : '';
    if (change.indexOf('霸榜') >= 0) cc = 'up';
    el.innerHTML += '<tr><td><span class="rank-num ' + rc + '">' + rk + '</span></td><td style="text-align:left">' + escHTML(name) + (isCross ? '<span class="score">双</span>' : '') + '</td><td>' + escHTML(cat) + '</td><td class="' + cc + '">' + escHTML(change) + '</td></tr>';
  });
}

function renderSimTable(games) {
  var el = document.getElementById('simTableBody');
  if (!el) return;
  el.innerHTML = '';
  if (!games || !games.length) {
    el.innerHTML = '<tr><td colspan="7" style="color:#999;padding:16px;text-align:center">暂无数据</td></tr>';
    return;
  }
  games.forEach(function(g) {
    el.innerHTML += '<tr><td style="text-align:left"><strong>' + escHTML(g.name || '') + '</strong><br><span style="font-size:10px;color:#999">' + escHTML(g.company || '') + '</span></td><td>' + escHTML(g.mergePlay || '') + '</td><td>' + escHTML(g.theme || '') + '</td><td>' + (g.wxRank ? '#' + g.wxRank : '<span style="color:#999">未上榜</span>') + '</td><td>' + (g.dyRank ? '#' + g.dyRank : '<span style="color:#999">未上榜</span>') + '</td><td style="font-size:11px;color:var(--text-secondary)">' + escHTML(g.diff || '') + '</td></tr>';
  });
}

function renderSurgeTable(movers) {
  var el = document.getElementById('surgeTableBody');
  if (!el) return;
  el.innerHTML = '';
  if (!movers || !movers.length) {
    el.innerHTML = '<tr><td colspan="6" style="color:#999;padding:16px;text-align:center">本周无大幅上升游戏</td></tr>';
    return;
  }
  movers.forEach(function(m) {
    var rise = m.rise || 0;
    var riseDisplay = rise >= 999 || rise === 'NEW' ? '<span style="color:#e67e22;font-weight:600">NEW</span>' : '<span class="up">↑' + rise + '</span>';
    var platTag = (m.platform === '微信') ? 'blue' : 'orange';
    var bg = m.bgClass || '';
    el.innerHTML += '<tr class="' + bg + '"><td style="text-align:left;font-weight:600">' + escHTML(m.name || '') + '</td><td><span class="tag ' + platTag + '">' + escHTML(m.platform || '') + '</span></td><td>' + escHTML(m.category || '') + '</td><td>' + riseDisplay + '</td><td style="font-size:10px;color:#999">' + escHTML(m.company || '--') + '</td><td style="font-size:11px;text-align:left;color:var(--text-secondary)">' + escHTML(m.insight || '') + '</td></tr>';
  });
}

function renderPolicies(policies) {
  var el = document.getElementById('policyContent');
  if (!el) return;
  // 桌面端兼容：合并 HTML
  if (policies._combinedHtml) {
    el.innerHTML = policies._combinedHtml;
    return;
  }
  var keys = ['wechat','apple','douyin','android','banhao','industry'];
  var labels = { wechat:'📣 微信小游戏', apple:'🍎 苹果', douyin:'🎵 抖音小游戏', android:'📱 华为/小米/OPPO/vivo/TapTap', banhao:'📜 版号更新', industry:'📈 行业动态' };
  el.innerHTML = keys.map(function(k) {
    var content = policies[k] || '';
    // gen_report_v3 格式：内容以 <h3> 开头，自带完整结构
    if (content.indexOf('<h3') === 0) {
      return '<div style="margin-bottom:10px">' + content + '</div>';
    }
    return '<div class="policy-box"><div class="pb-title"><span class="pb-icon">' + labels[k].slice(0,2) + '</span>' + labels[k] + '</div><div class="pb-body">' + (content || '<span style="color:#999">本周无更新</span>') + '</div></div>';
  }).join('');
}

function renderTrends(trends) {
  var el = document.getElementById('trendCards');
  if (!el) return;
  el.innerHTML = '';
  if (!trends || !trends.length) {
    el.innerHTML = '<div style="color:#999;padding:20px;text-align:center">暂无趋势数据</div>';
    return;
  }
  trends.forEach(function(t) {
    var title = t.title || '';
    var content = t.content || '';
    el.innerHTML += '<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:4px">' + escHTML(title) + '</div><div class="card-desc" style="font-size:12px">' + escHTML(content) + '</div></div>';
  });
}

// ====== 图表 ======
function renderCharts(charts) {
  for (var k in chartInstances) { if (chartInstances[k]) chartInstances[k].destroy(); }
  chartInstances = {};
  var cats = charts.cats || [];
  var wxData = charts.wx || [];
  var dyData = charts.dy || [];
  if (!cats.length) return;
  var pieOpts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { size: 10 }, boxWidth: 12, padding: 8 } } } };
  var wxC = document.getElementById('wxCatChart');
  if (wxC && cats.length) chartInstances.wx = new Chart(wxC, { type: 'pie', data: { labels: cats, datasets: [{ data: wxData, backgroundColor: CHART_COLORS }] }, options: pieOpts });
  var dyC = document.getElementById('dyCatChart');
  if (dyC && cats.length) chartInstances.dy = new Chart(dyC, { type: 'pie', data: { labels: cats, datasets: [{ data: dyData, backgroundColor: CHART_COLORS }] }, options: pieOpts });
  var cmpC = document.getElementById('cmpChart');
  if (cmpC && cats.length) chartInstances.cmp = new Chart(cmpC, {
    type: 'bar',
    data: { labels: cats, datasets: [
      { label: '微信', data: wxData, backgroundColor: 'rgba(10,124,66,0.7)', borderRadius: 4 },
      { label: '抖音', data: dyData, backgroundColor: 'rgba(102,126,234,0.7)', borderRadius: 4 }
    ]},
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { font: { size: 10 }, boxWidth: 12 } } }, scales: { x: { grid: { display: false }, ticks: { font: { size: 9 } } }, y: { beginAtZero: true, ticks: { stepSize: 2, font: { size: 9 } }, grid: { color: 'rgba(0,0,0,0.06)' } } } }
  });
}

// ====== 滚动监听 ======
function initScrollSpy() {
  navSections = [];
  document.querySelectorAll('[data-nav]').forEach(function(a) {
    var id = a.getAttribute('href').replace('#', '');
    navSections.push({ id: id, el: document.getElementById(id) });
  });
  if (!navSections.length) return;
  function update() {
    var scrollY = window.scrollY + 90;
    var activeId = null;
    navSections.forEach(function(item) {
      if (item.el && item.el.offsetTop <= scrollY + 50) activeId = item.id;
    });
    document.querySelectorAll('[data-nav]').forEach(function(a) {
      a.classList.toggle('scroll-active', a.getAttribute('href') === '#' + activeId);
    });
  }
  window.addEventListener('scroll', update, { passive: true });
  update();
}

// ====== UI ======
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function showDetail(title, body) {
  document.getElementById('modalTitle').textContent = title || '';
  document.getElementById('modalBody').innerHTML = '<p>' + (body || '') + '</p>';
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function renderEmpty() {
  document.getElementById('mainContent').innerHTML =
    '<div class="loading-state" style="padding:80px 20px"><p style="font-size:18px;margin-bottom:8px">📋</p><p>暂无周报数据</p><p style="font-size:12px;color:#999;margin-top:4px">首份报告将在下次生成后自动显示</p><p style="margin-top:16px"><a href="' + BASE + 'index.html" style="color:var(--primary);font-size:13px">查看汇总报告 →</a></p></div>';
}

function renderError(msg) {
  document.getElementById('mainContent').innerHTML =
    '<div class="error-state"><div class="err-icon">⚠️</div><p>' + (msg || '加载失败') + '</p><button class="retry-btn" onclick="location.reload()">重试</button><p style="margin-top:16px"><a href="' + BASE + 'index.html" style="color:var(--primary);font-size:13px">查看汇总报告 →</a></p></div>';
}

function syncData() {
  var btn = document.getElementById('syncBtn');
  btn.disabled = true; btn.innerHTML = '⏳ 同步中...';
  fetch('https://13yan.github.io/weekly-reports/').then(function(r) {
    if (r.ok) { btn.innerHTML = '✅ 同步成功'; setTimeout(function() { btn.innerHTML = '🔄 同步最新数据'; btn.disabled = false; }, 2000); }
    else throw Error();
  }).catch(function() {
    btn.innerHTML = '❌ 同步失败';
    setTimeout(function() { btn.innerHTML = '🔄 同步最新数据'; btn.disabled = false; }, 2000);
  });
}

// ====== 导航点击 ======
document.addEventListener('click', function(e) {
  var nav = e.target.closest('[data-nav]');
  if (nav) {
    e.preventDefault();
    var target = nav.getAttribute('href');
    document.querySelector(target).scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.querySelectorAll('[data-nav]').forEach(function(n) { n.classList.remove('active'); });
    nav.classList.add('active');
    if (window.innerWidth <= 768) toggleSidebar();
  }
});

// ====== 工具 ======
function fetchJSON(url, timeout) {
  timeout = timeout || 15000;
  var controller = new AbortController();
  var timer = setTimeout(function() { controller.abort(); }, timeout);
  return fetch(url, { signal: controller.signal }).then(function(r) {
    clearTimeout(timer);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).catch(function(e) {
    clearTimeout(timer);
    throw e;
  });
}

function escHTML(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHTML(s); }

// ====== 启动 ======
init();
</script>
