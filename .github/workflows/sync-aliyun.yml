name: Sync to Aliyun OSS

on:
  push:
    branches:
      - main
    paths:
      - 'weekly-reports/**'
      - '.github/workflows/sync-aliyun.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OSSUTIL
        run: |
          wget https://gosspublic.alicdn.com/ossutil/ossutil-v1.7.3.zip -O ossutil.zip
          unzip -q ossutil.zip
          chmod +x ossutil

      - name: Configure OSSUTIL
        env:
          OSSUTIL_CONFIG: /tmp/ossutilconfig
        run: |
          cat > $OSSUTIL_CONFIG << EOF
          [Credentials]
          language=CH
          accessKeyID=${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          accessKeySecret=${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          endpoint=${{ secrets.ALIYUN_OSS_ENDPOINT }}
          EOF

      - name: Upload to OSS
        run: |
          ./ossutil cp -r weekly-reports oss://${{ secrets.ALIYUN_OSS_BUCKET }}/ --config-file=/tmp/ossutilconfig
