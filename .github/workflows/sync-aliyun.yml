name: Sync to Aliyun OSS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install OSS SDK
        run: pip install oss2

      - name: Configure static website (enable subdirectory index)
        env:
          ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
        run: |
          python << 'EOF'
          import oss2
          import os, hashlib, base64, hmac, urllib.request
          from datetime import datetime

          key_id = os.environ['ACCESS_KEY_ID']
          key_secret = os.environ['ACCESS_KEY_SECRET']
          endpoint = os.environ['ENDPOINT']
          bucket = os.environ['BUCKET']

          body = '''<?xml version="1.0" encoding="UTF-8"?>
          <WebsiteConfiguration>
            <IndexDocument><Suffix>index.html</Suffix></IndexDocument>
            <SupportSubDir>true</SupportSubDir>
          </WebsiteConfiguration>'''

          date = datetime.utcnow().strftime('%a, %d %b %Y %H:%M:%S GMT')
          content_md5 = base64.b64encode(hashlib.md5(body.encode('utf-8')).digest()).decode()
          content_type = 'application/xml'
          resource = '/' + bucket + '/?website'
          string_to_sign = f'PUT\n{content_md5}\n{content_type}\n{date}\n{resource}'
          signature = base64.b64encode(
              hmac.new(key_secret.encode(), string_to_sign.encode(), hashlib.sha1).digest()
          ).decode()

          url = f'https://{bucket}.{endpoint}/?website'
          req = urllib.request.Request(url, data=body.encode('utf-8'), method='PUT')
          req.add_header('Content-Type', content_type)
          req.add_header('Content-MD5', content_md5)
          req.add_header('Date', date)
          req.add_header('Authorization', f'OSS {key_id}:{signature}')

          with urllib.request.urlopen(req) as resp:
              print(f'Status: {resp.status}')
              print(f'Response: {resp.read().decode()}')
          print('✅ Static website configured: index.html, subdirectory index enabled')
          EOF

      - name: Upload to OSS
        env:
          ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
        run: |
          python << 'EOF'
          import oss2
          import os

          auth = oss2.Auth(os.environ['ACCESS_KEY_ID'], os.environ['ACCESS_KEY_SECRET'])
          bucket = oss2.Bucket(auth, os.environ['ENDPOINT'], os.environ['BUCKET'])

          for root, dirs, files in os.walk('.'):
            for file in files:
              if '.git' in root:
                continue
              local_path = os.path.join(root, file)
              remote_path = local_path.lstrip('./')
              bucket.put_object_from_file(remote_path, local_path)
              print(f'Uploaded: {remote_path}')

          print('Done!')
          EOF
