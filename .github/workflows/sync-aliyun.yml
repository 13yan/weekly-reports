name: Sync to Aliyun OSS

on:
  push:
    branches:
      - main
    paths:
      - 'weekly-reports/**'
      - '.github/workflows/sync-aliyun.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload to OSS
        uses: manyunyu/aliyun-ossutil-action@main
        with:
          access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          bucket: ${{ secrets.ALIYUN_OSS_BUCKET }}
          endpoint: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          source: './weekly-reports'
          target: 'oss://${{ secrets.ALIYUN_OSS_BUCKET }}/'
          extra-options: '--recursive'
